services:
  - type: web
    name: yourcoin-radar-bot
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: npm start
    maxShutdownDelaySeconds: 120
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_NAME
        value: Ogres Radar
      - key: BRAND
        value: Ogres
      - key: WALLET_URL_TEMPLATE
        value: https://solscan.io/account/{wallet}
      - key: DATA_PROVIDER
        value: dexscreener
      - key: DATA_FILE
        value: /tmp/yourcoin-radar/radar-store.json
      - key: DATA_FALLBACK_FILE
        value: /tmp/yourcoin-radar/radar-store.json
      - key: ALLOW_VAR_DATA_FILE
        value: false
      - key: SOCIAL_FOOTER_ENABLED
        value: true
      - key: SOCIAL_FOOTER_TITLE
        value: Powered by Ogres
      - key: SOCIAL_TELEGRAM_URL
        value: https://t.me/ogrecoinonsol
      - key: SOCIAL_WEBSITE_URL
        value: https://ogremode.com/
      - key: SOCIAL_TWITTER_URL
        value: https://twitter.com/i/communities/1930265213917425858
      - key: BACKUP_CHAT_ID
        value: ""
      - key: ADMIN_USER_IDS
        value: ""
      - key: ALLOW_CHAT_ADMIN_BACKUP
        value: true
      - key: BACKUP_ALLOW_PUBLIC_CHATS
        value: false
      - key: BACKUP_INTERVAL_MINUTES
        value: 1440
      - key: BACKUP_ON_START
        value: true
      - key: BACKUP_ON_SHUTDOWN
        value: true
      - key: BACKUP_SKIP_UNCHANGED
        value: true
      - key: ENABLE_RESTORE_COMMAND
        value: true
      - key: MAX_BACKUP_BYTES
        value: 45000000
      - key: KEEPALIVE_INTERVAL_MINUTES
        value: 10
      - key: KEEPALIVE_URL
        value: ""
      - key: ENABLE_HEALTH_SERVER
        value: true
      - key: POLL_TIMEOUT_SECONDS
        value: 30
      - key: ALERT_TICK_SECONDS
        value: 30
      - key: COMMAND_GATE_MESSAGES
        value: 10
      - key: PANEL_REUSE_MINUTES
        value: 60
      - key: ENABLE_AUTO_CA_SCAN
        value: false
      - key: ENABLE_IMMEDIATE_GROUP_ALERTS
        value: false
      - key: MARKET_REFRESH_INTERVAL_SECONDS
        value: 60
      - key: DEXSCREENER_API_BASE
        value: https://api.dexscreener.com
      - key: DEXSCREENER_SEARCH_QUERIES
        value: SOL/USDC,SOL,pump,pumpfun,raydium,meteora,moonshot,bonk
      - key: DEXSCREENER_MAX_TOKENS
        value: 120
      - key: NEW_PAIR_DEFAULT_AGE_MINUTES
        value: 60
      - key: NEW_PAIR_MIN_LIQUIDITY_USD
        value: 5000
      - key: NEW_PAIR_FRESH_MIN_LIQUIDITY_USD
        value: 2500
      - key: NEW_PAIR_FRESH_MIN_VOLUME_USD
        value: 8000
      - key: MARKET_QUALITY_FILTER_ENABLED
        value: true
      - key: MARKET_QUALITY_MIN_SCORE
        value: 62
      - key: MARKET_QUALITY_FRESH_MIN_LIQUIDITY_USD
        value: 2500
      - key: SOLANA_TRACKER_API_KEY
        value: ""
      - key: SOLANA_TRACKER_API_BASE
        value: https://data.solanatracker.io
      - key: SOLANA_TRACKER_RISK_ENABLED
        value: true
      - key: SOLANA_TRACKER_MAX_RISK_SCORE
        value: 7
      - key: DELETE_WEBHOOK_ON_START
        value: true
      - key: DROP_PENDING_UPDATES_ON_START
        value: false
      - key: RESET_TELEGRAM_OFFSET_ON_START
        value: true
      - key: GROUP_DIGEST_MINUTES
        value: 60
      - key: USER_HOURLY_DIGEST_MINUTES
        value: 60
      - key: USER_DAILY_DIGEST_HOUR
        value: 9
